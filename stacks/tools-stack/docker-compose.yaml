services:

# FRESHRSS
  freshrss:
    image: linuxserver/freshrss:${VERSION_FRESHRSS}
    container_name: freshrss
    restart: unless-stopped
    environment:
      CRON_MIN: 5, 25, 45
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /home/docker/freshrss/config:/config
    networks:
      - net
      - public
    ports:
      - ${PORT1_FRESHRSS}:80

# IT-TOOLS
  it-tools:
    image: sharevb/it-tools:${VERSION_IT_TOOLS}
    container_name: it-tools
    restart: unless-stopped
    volumes:
      - /etc/localtime:/etc/localtime:ro
    networks:
      - net
      - public
    ports:
      - ${PORT1_IT_TOOLS}:8080

# WALLOS
  wallos:
    image: bellamy/wallos:${VERSION_WALLOS}
    container_name: wallos
    restart: unless-stopped
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /home/docker/wallos/db:/var/www/html/db
      - /home/docker/wallos/logos:/var/www/html/images/uploads/logos
    networks:
      - net
    ports:
      - ${PORT1_WALLOS}:80/tcp

# SQLITEBROWSER
  sqlitebrowser:
    image: linuxserver/sqlitebrowser:${VERSION_SQLITEBROWSER}
    container_name: sqlitebrowser
    restart: unless-stopped
    environment:
      PUID: 1000
      PGID: 1000
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /home/docker/sqlitebrowser/config:/config
      - ${VOL1_SQLITEBROWSER_EDIT}:/data
    networks:
      - net
    ports:
      - ${PORT1_SQLITEBROWSER}:3000
      - ${PORT2_SQLITEBROWSER}:3001


# UNMANIC
  unmanic:
    image: josh5/unmanic:${VERSION_UNMANIC}
    container_name: unmanic
    restart: unless-stopped
    healthcheck:
      test: "curl ifconfig.me  || exit 1"
      interval: 1m
      timeout: 10s
    environment:
      PUID: 1000
      PGID: 1000
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /home/docker/unmanic/config:/config
      - ${VOL1}/Library/Media/Movies:/library/movies
      - ${VOL1}/Library/Media/TVShows:/library/tvshows
      - type: tmpfs
        target: /tmp/unmanic
    devices:
      - /dev/dri:/dev/dri
    networks:
      - net
    ports:
      - ${PORT1_UNMANIC}:8888

# KIWIX
  kiwix:
      image: ghcr.io/kiwix/kiwix-serve:${VERSION_KIWIX}
      container_name: kiwix
      restart: unless-stopped
      command:
        - '*.zim'
      environment:
        PUID: 1000
        PGID: 1000
        DOWNLOAD: ${ENV_KIWIX_DOWNLOAD}
      volumes:
        - /etc/localtime:/etc/localtime:ro
        - ${VOL1}/Documents/Wiki:/data
      networks:
        - net
      ports:
        - ${PORT1_KIWIX}:8080

# BENTO PDF
  bento-pdf:
    image: ghcr.io/alam00000/bentopdf-simple:${VERSION_BENTO_PDF}
    container_name: bento-pdf
    restart: unless-stopped
    environment:
      DISABLE_IPV6: true
    volumes:
      - /etc/localtime:/etc/localtime:ro
    networks:
        - net
        - public
    ports:
      - ${PORT1_BENTO_PDF}:8080
    

networks:
  net:
    driver: bridge
  public:
    name: reverseproxy-stack_net
    external: true

